services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartsplit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartsplit}
      POSTGRES_DB: smartsplit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsplit -d smartsplit"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://smartsplit:${POSTGRES_PASSWORD:-smartsplit}@db:5432/smartsplit
      SMARTSPLIT_SECRET: ${SMARTSPLIT_SECRET:-change-me-to-a-long-random-string}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # "Sign in with Google"; unset = the button is hidden
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # email one-time codes; unset = codes are logged instead of mailed
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SmartSplit}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-10}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "${SMARTSPLIT_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  pgdata:

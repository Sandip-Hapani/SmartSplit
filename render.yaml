# One-click deploy on Render's free tier, backed by an external Neon Postgres.
#
#   1. Create a free project at neon.tech and copy its connection string
#   2. render.com → New → Blueprint → pick this repo, branch main
#   3. Paste the Neon string into DATABASE_URL when Render asks (see note below)
#
# The free web service sleeps after ~15 minutes idle and takes roughly a minute
# to wake, which is fine for a test instance — say so in your README so testers
# don't file "the site is slow" issues.
#
# Why Neon and not Render's own database: Render's free Postgres is deleted after
# 30 days. Neon's free tier does not expire, so the data survives.

services:
  - type: web
    name: smartsplit
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # Paste your Neon connection string here in the Render dashboard. Neon
      # gives you a "postgresql://..." URL — change the prefix to
      # "postgresql+psycopg://..." so SQLAlchemy uses the installed driver, and
      # keep the "?sslmode=require" that Neon appends.
      - key: DATABASE_URL
        sync: false
      - key: SMARTSPLIT_ENV
        value: production
      # generated once by Render and kept secret; never commit a real one
      - key: SMARTSPLIT_SECRET
        generateValue: true

      # --- optional, set in the Render dashboard if you want them ---
      # Google sign-in: add your deployed URL to the Authorised JavaScript
      # origins in Google Cloud Console first, or the button will not work.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Email codes. Without SMTP the app hides email sign-in entirely and
      # falls back to Google / password — which is safe, just less convenient.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      # Receipt parsing falls back to this for photos and scans. Leaving it
      # unset still parses text PDFs locally; setting it means strangers'
      # uploads spend your Groq quota.
      - key: GROQ_API_KEY
        sync: false
